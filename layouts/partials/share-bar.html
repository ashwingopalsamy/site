<div class="share-bar">
  <button class="share-btn" data-copy-url="{{ .Permalink }}">
    {{ partial "icons/link.html" (dict "size" "13" "weight" "1.8") }}
    <span class="share-btn-text">Copy link</span>
  </button>
  {{ if .Permalink }}
  <button class="share-btn" data-share-native="{{ .Permalink }}" data-share-title="{{ .Title }}">
    {{ partial "icons/share.html" (dict "size" "13" "weight" "1.8") }}
    <span class="share-btn-text">Share</span>
  </button>
  {{ end }}
</div>
