{{ $tags := .Site.Taxonomies.tags }}
<div class="tag-pills">
  <button class="tag-pill tag-pill--search" data-search-trigger aria-label="Search writing">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  {{ if $tags }}
  {{ range $tags.Alphabetical }}
  <a href="{{ .Page.RelPermalink }}" class="tag-pill{{ if eq $.RelPermalink .Page.RelPermalink }} active{{ end }}">{{ .Page.Title }}</a>
  {{ end }}
  {{ end }}
</div>
