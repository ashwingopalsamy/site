<div class="lightbox" id="diagram-lightbox" role="dialog" aria-modal="true" hidden>
  <div class="lightbox-backdrop"></div>
  <div class="lightbox-content">
    <div class="lightbox-body" id="lightbox-body"></div>
    <div class="lightbox-controls">
      <button class="lightbox-btn" data-action="download-svg" aria-label="Download SVG">SVG</button>
      <button class="lightbox-btn" data-action="download-png" aria-label="Download PNG">PNG</button>
      <button class="lightbox-btn" data-action="share" aria-label="Share">Share</button>
      <button class="lightbox-btn lightbox-close" data-action="close" aria-label="Close">&times;</button>
    </div>
  </div>
</div>
