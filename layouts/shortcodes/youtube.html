<div class="video-container">
  <iframe
    src="https://www.youtube-nocookie.com/embed/{{ index .Params 0 }}"
    title="YouTube video"
    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen
    loading="lazy">
  </iframe>
</div>
