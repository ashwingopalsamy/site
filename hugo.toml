baseURL = "https://ashwingopalsamy.in/"
languageCode = "en-us"
title = "Ashwin Gopalsamy"
enableRobotsTXT = false
enableGitInfo = false

[params]
  description = "Staff Software Engineer scaling authorization infrastructure at Pismo, Visa."
  author = "Ashwin Gopalsamy"
  twitter = "@ashwin2125"
  github = "ashwingopalsamy"
  plausibleDomain = "ashwingopalsamy.in"
  # bingVerification = "YOUR_BING_VERIFICATION_CODE"
  # Hero layout: true = new identity-first layout, false = original name-first layout
  enableNewHero = true
  # Copy for new hero — edit these without touching templates
  heroStatement  = "Software engineer.<br>AI systems thinker."
  heroBio        = "Building distributed systems at Visa scale — authorization infrastructure processing billions of card decisions per day. Writing about Go, distributed systems, and AI."

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "LLMS", "LLMSFULL", "MARKDOWN"]
  page = ["HTML", "MARKDOWN"]
  section = ["HTML", "RSS", "MARKDOWN"]

[outputFormats]
  [outputFormats.MARKDOWN]
    mediaType = "text/markdown"
    isPlainText = true
    baseName = "index"
    name = "MARKDOWN"
    rel = "alternate"
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.LLMSFULL]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[permalinks]
  writing = "/writing/:slug/"
  "writing/notes" = "/writing/notes/:slug/"
  projects = "/projects/:slug/"
  tags = "/writing/tags/:slug/"
